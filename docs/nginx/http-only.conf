# 证书申请前使用：HTTP-only，提供 ACME challenge 路径
server {
    listen 80;
    server_name welink.click www.welink.click demo.welink.click;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri.html $uri/ /index.html;
    }
}
