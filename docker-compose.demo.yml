services:
  backend:
    image: ghcr.io/runzhliu/welink/backend:main
    build: ./backend
    container_name: welink-backend-demo
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      - GIN_MODE=release
      - DEMO_MODE=true
      - DATA_DIR=/app/demo-data

  frontend:
    image: ghcr.io/runzhliu/welink/frontend:main
    build: ./frontend
    container_name: welink-frontend-demo
    depends_on:
      - backend
    networks:
      - welink-net

networks:
  welink-net:
    external: true
